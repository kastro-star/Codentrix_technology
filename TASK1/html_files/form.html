<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>

    <link rel="stylesheet" href="../css_files/form.css">
</head>
<!-- Form page -->
<body>
<!-- No Nav bar contents  -->
    <header>
        <!-- <nav>
            <img src="../assets/images/logo-horizontal.webp">
        </nav> -->
    </header>

    <main>
            <!-- vertical form  -->
        <div class="form-box">

            <div class="logo-box">
                <img src="../assets/images/logo-horizontal.webp" alt="logo">
            </div>

            <h2>Create User</h2>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="phone-number">Phone Number</label>
                <input type="tel" id="phone-number" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" placeholder="Enter address"></textarea>
            </div>

            <div class="form-group">
                <label for="status">Status</label>

                <select id="status">
                    <option value="">Select Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>

            <div class="button-box">
                <button type="submit">Create User</button>
            </div>

        </div>

    </main>

    <footer>

    </footer>

</body>

</html>
