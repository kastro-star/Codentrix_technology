<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="../css_files/login.css">
</head>
<!-- Login page contens -->
<body>
    <!-- NO navbar contents -->
    <header>
    </header>
    <main>
        <!-- centre fixed loginbox use Linear gradient background -->
        <div class="login-box">
            <div>
                <img class="logo" src="../assets/images/logo.jpg">
                <h1>Sign in with Email</h1>
                <h3>Welcome Admin</h3>
            </div>
            <div class="inputs">
                <input type="email" id="email" placeholder="Enter your email">
            </div><br>
            <div class="inputs">
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <br>
            <div class="inputs">
                <button id="login-pass" type="button" onclick="window.location.href='Dashboard.html'">Login</button>
            </div>
            <br>
            <div>
                <h5>Dont have an account ? Sign up</h5><br>
                <button class="guest-login" onclick="window.location.href='Dashboard.html'">Browse as a Guest</button>
            </div>
        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
