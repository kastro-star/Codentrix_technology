<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Form</title>
  <link href="../output.css" rel="stylesheet">
</head>
<!-- Form page codes -->
<body class="bg-gray-100 p-6">

  <div class="max-w-5xl  h-90  mx-auto bg-white rounded-s-sm shadow p-6 ">

    <div class="flex items-center justify-between mb-6 border-b pb-3">

  
  <h2 class="text-xl font-semibold">
    Create Customer
  </h2>

  
  <div class="flex gap-3">

    <!-- back navigation using Js -->
    <a href="javascript:history.back()"
       class="px-4 py-2 text-sm border rounded-md  text-white   bg-gray-900   hover:bg-gray-400 transition">
      ← Back
    </a>

  </div>

</div>

    

    <form class="space-y-6">

      <!-- Horizontal based form  -->
      <div class="grid grid-cols-3 gap-6">

        <div>
          <label class="text-sm font-medium text-gray-600">Customer Name</label>
          <input type="text" placeholder="Enter name"
            class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="text-sm font-medium text-gray-600">Age</label>
          <input type="number" placeholder="Enter age"
            class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="text-sm font-medium text-gray-600">Email</label>
          <input type="email" placeholder="Enter email"
            class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

      </div>

      
      <div class="grid grid-cols-3 gap-6">

        <div>
          <label class="text-sm font-medium text-gray-600">Phone No</label>
          <input type="tel" placeholder="Enter phone"
            class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="text-sm font-medium text-gray-600">Gender</label>
          <select class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            <option>Select gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label class="text-sm font-medium text-gray-600">Status</label>
          <select class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            <option>Select status</option>
            <option>Active</option>
            <option>Inactive</option>
          </select>
        </div>

      </div>

      
      <div class="flex justify-end pt-4 ">

        <button type="submit"
          class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition">
          Create Customer
        </button>

      </div>

    </form>

  </div>

</body>
</html>
